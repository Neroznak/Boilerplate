services:
  postgres:
    image: postgres:16
    container_name: boilerplate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: boilerplate
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: boilerplate-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/dev.Dockerfile
    container_name: boilerplate-api
    working_dir: /app
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - api_root_node_modules:/app/node_modules
      - api_app_node_modules:/app/apps/api/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - config_node_modules:/app/packages/config/node_modules
      - database_node_modules:/app/packages/database/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/boilerplate?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      CI: "true"
      PORT: 5000
      TSC_WATCHFILE: "PriorityPollingInterval"
      TSC_WATCHDIRECTORY: "RecursiveDirectoryUsingFsWatchFile"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/dev.Dockerfile
    container_name: boilerplate-web
    working_dir: /app
    ports:
      - "3005:3000"
    volumes:
      - .:/app
      - api_root_node_modules:/app/node_modules
      - web_app_node_modules:/app/apps/web/node_modules
      - shared_node_modules:/app/packages/shared/node_modules
      - config_node_modules:/app/packages/config/node_modules
    environment:
      NODE_ENV: development
      CI: "true"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_root_node_modules:
  api_app_node_modules:
  web_app_node_modules:
  config_node_modules:
  database_node_modules:
  shared_node_modules: