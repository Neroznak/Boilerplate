name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
            node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @repo/database exec prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/boilerplate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Build API Docker image
        run: docker build -f apps/api/prod.Dockerfile -t api .

      - name: Build Web Docker image
        run: docker build -f apps/web/prod.Dockerfile -t web .

