services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_prod_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/prod.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/prod.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      - api

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres_prod_data:
  redis_prod_data: